<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .rail { stroke: #202020; stroke-width: 4; fill: none; stroke-linecap: round; }
      .wire { stroke: #202020; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #202020; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .device { stroke: #141414; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #202020; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 31px; font-weight: 700; fill: #111; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #555; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 20px; fill: #111; font-weight: 700; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #333; }
      .value { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #333; }
      .railtext { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #111; font-weight: 700; }
      .stagebox { fill: #ffffff; stroke: #c8c8bd; stroke-width: 2; rx: 8; }
      .opbox1 { fill: #edf7f4; stroke: #68a99a; stroke-width: 2; rx: 8; }
      .opbox2 { fill: #fff4e8; stroke: #d59b5f; stroke-width: 2; rx: 8; }
      .note { fill: #f1f1ec; stroke: #c9c9bf; stroke-width: 1.5; rx: 8; }
      .arrow { marker-end: url(#arrowhead); }
      .cap { stroke: #275f8f; stroke-width: 4; }
      .accent1 { stroke: #2d7f71; }
      .accent2 { stroke: #b66a2e; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#202020"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="920"/>

  <text x="52" y="58" class="title">BJT 2-Stage DC Operating Point Baseline</text>
  <text x="52" y="88" class="subtitle">Source: netlists/bjt2_op.spice, results/ngspice/tables/bjt2_op_summary.csv</text>

  <!-- Rails -->
  <line x1="110" y1="145" x2="1325" y2="145" class="rail"/>
  <text x="1350" y="152" class="railtext">VDD = 5.0 V</text>
  <line x1="110" y1="770" x2="1325" y2="770" class="rail"/>
  <text x="1350" y="777" class="railtext">GND</text>

  <!-- Stage boxes -->
  <rect x="110" y="125" width="540" height="660" class="stagebox"/>
  <rect x="780" y="125" width="540" height="660" class="stagebox"/>
  <text x="136" y="178" class="label">Stage 1 common-emitter</text>
  <text x="806" y="178" class="label">Stage 2 common-emitter</text>

  <!-- Stage 1 bias divider -->
  <line x1="265" y1="145" x2="265" y2="210" class="wire"/>
  <polyline points="265,210 245,222 285,246 245,270 285,294 245,318 265,342" class="device"/>
  <line x1="265" y1="342" x2="265" y2="435" class="wire"/>
  <polyline points="265,435 245,447 285,471 245,495 285,519 245,543 265,567" class="device"/>
  <line x1="265" y1="567" x2="265" y2="770" class="wire"/>
  <circle cx="265" cy="342" r="6" class="node"/>
  <text x="292" y="260" class="small">RB1_TOP</text>
  <text x="292" y="282" class="value">330k</text>
  <text x="292" y="490" class="small">RB1_BOT</text>
  <text x="292" y="512" class="value">100k</text>
  <text x="292" y="350" class="small">b1_base = 1.129207 V</text>

  <!-- Stage 1 collector resistor -->
  <line x1="515" y1="145" x2="515" y2="210" class="wire"/>
  <polyline points="515,210 495,222 535,246 495,270 535,294 495,318 515,342" class="device"/>
  <text x="542" y="260" class="small">RC1</text>
  <text x="542" y="282" class="value">100k</text>

  <!-- Stage 1 BJT -->
  <circle cx="480" cy="470" r="72" class="device accent1"/>
  <line x1="265" y1="342" x2="415" y2="440" class="wire"/>
  <line x1="415" y1="400" x2="415" y2="535" class="device"/>
  <line x1="415" y1="440" x2="475" y2="400" class="device"/>
  <line x1="475" y1="400" x2="515" y2="342" class="wire"/>
  <line x1="415" y1="505" x2="475" y2="545" class="device"/>
  <line x1="475" y1="545" x2="515" y2="615" class="wire"/>
  <polyline points="457,536 482,549 465,522" fill="none" stroke="#141414" stroke-width="3"/>
  <text x="463" y="474" class="label">Q1</text>
  <text x="360" y="580" class="small">sky130_fd_pr__npn_05v5</text>

  <!-- Stage 1 emitter resistor -->
  <circle cx="515" cy="615" r="6" class="node"/>
  <line x1="515" y1="615" x2="515" y2="640" class="wire"/>
  <polyline points="515,640 495,652 535,676 495,700 535,724 515,770" class="device"/>
  <text x="542" y="688" class="small">RE1</text>
  <text x="542" y="710" class="value">20k</text>
  <text x="542" y="626" class="small">b1_emitter = 0.335519 V</text>

  <!-- Stage 1 collector node -->
  <circle cx="515" cy="342" r="6" class="node"/>
  <text x="542" y="350" class="small">b1_collector = 3.366164 V</text>

  <!-- Interstage coupling capacitor -->
  <line x1="515" y1="342" x2="690" y2="342" class="wire arrow"/>
  <line x1="700" y1="300" x2="700" y2="384" class="cap"/>
  <line x1="728" y1="300" x2="728" y2="384" class="cap"/>
  <line x1="728" y1="342" x2="935" y2="342" class="wire arrow"/>
  <text x="672" y="280" class="label">CINT</text>
  <text x="676" y="408" class="value">1u, DC blocked</text>
  <rect x="604" y="452" width="292" height="78" class="note"/>
  <text x="625" y="482" class="small">Interstage DC separation</text>
  <text x="625" y="507" class="label">b1_collector - b2_base = 2.236957 V</text>

  <!-- Stage 2 bias divider -->
  <line x1="935" y1="145" x2="935" y2="210" class="wire"/>
  <polyline points="935,210 915,222 955,246 915,270 955,294 915,318 935,342" class="device"/>
  <line x1="935" y1="342" x2="935" y2="435" class="wire"/>
  <polyline points="935,435 915,447 955,471 915,495 955,519 915,543 935,567" class="device"/>
  <line x1="935" y1="567" x2="935" y2="770" class="wire"/>
  <circle cx="935" cy="342" r="6" class="node"/>
  <text x="962" y="260" class="small">RB2_TOP</text>
  <text x="962" y="282" class="value">330k</text>
  <text x="962" y="490" class="small">RB2_BOT</text>
  <text x="962" y="512" class="value">100k</text>
  <text x="962" y="350" class="small">b2_base = 1.129207 V</text>

  <!-- Stage 2 collector resistor -->
  <line x1="1185" y1="145" x2="1185" y2="210" class="wire"/>
  <polyline points="1185,210 1165,222 1205,246 1165,270 1205,294 1165,318 1185,342" class="device"/>
  <text x="1212" y="260" class="small">RC2</text>
  <text x="1212" y="282" class="value">100k</text>

  <!-- Stage 2 BJT -->
  <circle cx="1150" cy="470" r="72" class="device accent2"/>
  <line x1="935" y1="342" x2="1085" y2="440" class="wire"/>
  <line x1="1085" y1="400" x2="1085" y2="535" class="device"/>
  <line x1="1085" y1="440" x2="1145" y2="400" class="device"/>
  <line x1="1145" y1="400" x2="1185" y2="342" class="wire"/>
  <line x1="1085" y1="505" x2="1145" y2="545" class="device"/>
  <line x1="1145" y1="545" x2="1185" y2="615" class="wire"/>
  <polyline points="1127,536 1152,549 1135,522" fill="none" stroke="#141414" stroke-width="3"/>
  <text x="1133" y="474" class="label">Q2</text>
  <text x="1030" y="580" class="small">sky130_fd_pr__npn_05v5</text>

  <!-- Stage 2 emitter resistor -->
  <circle cx="1185" cy="615" r="6" class="node"/>
  <line x1="1185" y1="615" x2="1185" y2="640" class="wire"/>
  <polyline points="1185,640 1165,652 1205,676 1165,700 1205,724 1185,770" class="device"/>
  <text x="1212" y="688" class="small">RE2</text>
  <text x="1212" y="710" class="value">20k</text>
  <text x="1212" y="626" class="small">b2_emitter = 0.335519 V</text>

  <!-- Output node and high-Z load -->
  <circle cx="1185" cy="342" r="6" class="node"/>
  <line x1="1185" y1="342" x2="1310" y2="342" class="wire arrow"/>
  <circle cx="1310" cy="342" r="6" class="node"/>
  <text x="1212" y="350" class="small">b2_collector = 3.365828 V</text>
  <text x="1284" y="318" class="label">vout_final</text>
  <text x="1288" y="365" class="value">3.365828 V</text>
  <line x1="1310" y1="342" x2="1310" y2="448" class="wire"/>
  <polyline points="1310,448 1290,460 1330,484 1290,508 1330,532 1290,556 1310,580" class="device"/>
  <line x1="1310" y1="580" x2="1310" y2="770" class="wire"/>
  <text x="1338" y="512" class="small">RLOAD_OP</text>
  <text x="1338" y="534" class="value">1G</text>

  <!-- OP result callouts -->
  <rect x="72" y="812" width="430" height="78" class="opbox1"/>
  <text x="96" y="842" class="label">Stage 1 OP</text>
  <text x="96" y="868" class="small">VBE1 = 0.793688 V, VCE1 = 3.030645 V</text>

  <rect x="535" y="812" width="430" height="78" class="opbox2"/>
  <text x="559" y="842" class="label">Stage 2 OP</text>
  <text x="559" y="868" class="small">VBE2 = 0.793688 V, VCE2 = 3.030309 V</text>

  <rect x="998" y="812" width="430" height="78" class="note"/>
  <text x="1022" y="842" class="label">Supply summary</text>
  <text x="1022" y="868" class="small">Istatic = 56.1394 uA, PDC = 280.697 uW</text>
</svg>
