<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <style>
      .wire { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #111827; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .symbol { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #111827; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #374151; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #4b5563; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #111827; }
      .node { fill: #111827; }
      .block { fill: #f9fafb; stroke: #d1d5db; stroke-width: 2; rx: 8; }
