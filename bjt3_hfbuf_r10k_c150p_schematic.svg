  <text x="82" y="812" class="label">Notes</text>
  <text x="82" y="844" class="small">Each CE stage: RC=120k, RE=18.5k, RB_TOP=3.3M, RB_BOT=1M.</text>
  <text x="82" y="872" class="small">Coupling capacitors: CIN=C12=C23=68 nF. Shunt caps: CH1=CH2=CH3=30 pF.</text>
  <text x="82" y="900" class="small">Output rebias: COUT=10 nF, ROUT_TOP=ROUT_BOT=10M. Load: 10 pF.</text>
